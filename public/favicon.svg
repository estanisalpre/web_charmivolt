<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradiente dorado metálico, igual al logo -->
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#f0e080"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#d4a820"/>
      <stop offset="100%" stop-color="#9a7010"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fffacc"/>
      <stop offset="100%" stop-color="#e6c44a"/>
    </linearGradient>
    <!-- Sombra suave para profundidad -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo negro con esquinas levemente redondeadas -->
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>

  <!-- Rayo central — forma del charm "Volt" del logo -->
  <path
    d="M20 3 L9 17.5 L15.5 17.5 L12 29 L24 14 L17 14 Z"
    fill="url(#gold)"
    filter="url(#glow)"
  />
  <!-- Reflejo metálico en el rayo -->
  <path
    d="M20 3 L14.5 11.5 L17 14 L24 14 Z"
    fill="url(#goldLight)"
    opacity="0.6"
  />

  <!-- Estrella destello superior derecha — igual a los sparkles del logo -->
  <g fill="#f5e070" filter="url(#glow)">
    <path d="M26 5.5 L26.4 6.8 L27.8 7.2 L26.4 7.6 L26 8.9 L25.6 7.6 L24.2 7.2 L25.6 6.8 Z"/>
  </g>

  <!-- Micro destello inferior izquierda -->
  <g fill="#fffacc" opacity="0.75">
    <path d="M6.5 24.5 L6.8 25.4 L7.7 25.7 L6.8 26 L6.5 26.9 L6.2 26 L5.3 25.7 L6.2 25.4 Z"/>
  </g>
</svg>
